name: pure-domain-build-and-audit
on:
  push: { branches: [ main, develop ] }
  pull_request: { branches: [ main, develop ] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build Domain (pure .NET)
        run: dotnet build PureDomain/Domain.csproj -c Release
      - name: Test Domain (pure .NET)
        run: dotnet test PureDomain/Domain.Tests.csproj -c Release --no-build
      - name: Audit no Unity refs in pure packages
        run: |
          set -e
          set +e
          FOUND=
          set -e
          if [ -n "" ]; then
            echo 'ERROR: Unity API in pure packages'
            echo ""
            exit 1
          fi
